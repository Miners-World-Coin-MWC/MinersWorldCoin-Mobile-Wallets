name: Build Mobile Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Patch react-native-os (compile -> implementation)
        run: |
          FILE="node_modules/react-native-os/android/build.gradle"
          
          if [ -f "$FILE" ]; then
            echo "Patching $FILE"
            sed -i 's/compile /implementation /g' $FILE
          else
            echo "File not found: $FILE"
            exit 1
          fi

      - name: Build Android Release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Fix React Native env
        run: echo "RCT_NEW_ARCH_ENABLED=0" >> $GITHUB_ENV

      - name: Download Boost locally
        run: |
          mkdir -p ios/vendor/boost
          cd ios/vendor/boost

          curl -L https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2 -o boost_1_76_0.tar.bz2

      - name: Verify Boost file exists
        run: |
          ls -lah ios/vendor/boost

      - name: Override Boost podspec (FINAL FIX)
        run: |
          BOOST_PATH="$(pwd)/ios/vendor/boost/boost_1_76_0.tar.bz2"

          echo "Using Boost at: $BOOST_PATH"

          cat > node_modules/react-native/third-party-podspecs/boost.podspec << EOF
          Pod::Spec.new do |s|
            s.name     = 'boost'
            s.version  = '1.76.0'
            s.summary  = 'Boost C++ Libraries'
            s.homepage = 'https://www.boost.org'
            s.license  = { :type => 'Boost Software License' }
            s.author   = { 'Boost' => 'boost@lists.boost.org' }

            s.source = {
              :http => 'file://$BOOST_PATH'
            }

            s.header_dir = 'boost'
            s.source_files = 'boost/**/*.hpp'

            s.pod_target_xcconfig = {
              'CLANG_CXX_LANGUAGE_STANDARD' => 'c++17',
              'CLANG_CXX_LIBRARY' => 'libc++',
              'GCC_PREPROCESSOR_DEFINITIONS' => 'BOOST_NO_CXX11_CONSTEXPR'
            }
          end
          EOF

      - name: Fix Yoga for Xcode 15
        run: |
          FILE="node_modules/react-native/ReactCommon/yoga/yoga/Yoga.cpp"

          if [ -f "$FILE" ]; then
            echo "Patching Yoga.cpp for Xcode 15 compatibility..."
            sed -i '' 's/hadOverflow() |/hadOverflow() ||/g' $FILE
          else
            echo "Yoga.cpp not found!"
            exit 1
          fi

      - name: Install Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Patch iOS build issues
        run: |
          cd ios
          chmod +x fix-ios-build.sh
          ./fix-ios-build.sh

      - name: Build iOS (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace MinersWorldCoin.xcworkspace \
            -scheme MinersWorldCoin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd ios
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/app-unsigned.ipa