name: Build Mobile Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Patch react-native-os (compile -> implementation)
        run: |
          FILE="node_modules/react-native-os/android/build.gradle"
          
          if [ -f "$FILE" ]; then
            echo "Patching $FILE"
            sed -i 's/compile /implementation /g' $FILE
          else
            echo "File not found: $FILE"
            exit 1
          fi

      - name: Build Android Release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v 1.14.0
          pod repo update

      - name: Fix React Native env
        run: |
          echo "RCT_NEW_ARCH_ENABLED=0" >> $GITHUB_ENV
          echo "RCT_ENABLE_TURBO_MODULES=0" >> $GITHUB_ENV

      - name: Download & Patch Boost (no repack)
        run: |
          set -e

          mkdir -p ios/vendor/boost
          cd ios/vendor/boost

          echo "📦 Downloading Boost..."
          curl -L https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2 -o boost.tar.bz2

          tar -xjf boost.tar.bz2

          echo "🔧 Patching Boost..."

          FILE="boost_1_76_0/boost/type_traits/integral_constant.hpp"
          sed -i '' 's/BOOST_CONSTEXPR/constexpr/g' $FILE

          FILE="boost_1_76_0/boost/config/compiler/clang.hpp"
          sed -i '' '1s;^;#ifndef BOOST_CONSTEXPR\n#define BOOST_CONSTEXPR constexpr\n#endif\n;' $FILE

          echo "✅ Boost ready (EXTRACTED, NOT ARCHIVED)"
          ls -lah boost_1_76_0

      - name: Verify Boost file exists
        run: |
          ls -lah ios/vendor/boost

      - name: Override Boost podspec (LOCAL PATH FIX)
        run: |
          cat > node_modules/react-native/third-party-podspecs/boost.podspec << 'EOF'
          Pod::Spec.new do |s|
            s.name     = 'boost'
            s.version  = '1.76.0'
            s.summary  = 'Boost C++ Libraries'
            s.homepage = 'https://www.boost.org'
            s.license  = { :type => 'Boost Software License' }
            s.author   = { 'Boost' => 'boost@lists.boost.org' }

            # 🔥 USE LOCAL FOLDER (NOT TAR)
            s.source = { :path => '../../../ios/vendor/boost' }

            s.header_dir = 'boost'
            s.source_files = 'boost_1_76_0/boost/**/*.hpp'
            s.preserve_paths = 'boost_1_76_0'
            s.header_mappings_dir = 'boost_1_76_0'

            s.pod_target_xcconfig = {
              'HEADER_SEARCH_PATHS' => '"$(PODS_ROOT)/boost/boost_1_76_0" "$(PODS_ROOT)/boost/boost_1_76_0/boost"',
              'CLANG_CXX_LANGUAGE_STANDARD' => 'c++17',
              'CLANG_CXX_LIBRARY' => 'libc++'
            }
          end
          EOF

      - name: Ensure Boost exists in Pods
        run: |
          ls -lah ios/Pods/boost/boost_1_76_0/boost || (echo "❌ Boost missing!" && exit 1)
          ls -lah ios/Pods/boost/boost_1_76_0/libs || (echo "❌ Libs missing!" && exit 1)

      - name: Fix Yoga for Xcode 15
        run: |
          FILE="node_modules/react-native/ReactCommon/yoga/yoga/Yoga.cpp"
          if [ -f "$FILE" ]; then
            echo "Patching Yoga.cpp for Xcode 15..."
            sed -i '' 's/hadOverflow() |/hadOverflow() ||/g' $FILE
            sed -i '' 's/constexpr static/constexpr/' $FILE
          else
            echo "Yoga.cpp not found!"
            exit 1
          fi

      - name: Install Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Patch Folly (Post Install)
        run: |
          set -e

          cd ios

          echo "🔧 Patching Folly (FINAL FIX)..."

          FOLLY_FILE=$(find Pods -path "*/RCT-Folly/folly/dynamic.h" | head -n 1)

          if [ -f "$FOLLY_FILE" ]; then
            echo "Found: $FOLLY_FILE"

            # ❌ REMOVE the include completely
            sed -i '' '/#include <boost\/operators.hpp>/d' "$FOLLY_FILE"

            # ❌ REMOVE boost inheritance
            sed -i '' 's/private boost::operators<dynamic>//g' "$FOLLY_FILE"

            echo "✅ Removed boost dependency from Folly"
          else
            echo "❌ Folly dynamic.h not found"
            exit 1
          fi

      - name: Build iOS (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace MinersWorldCoin.xcworkspace \
            -scheme MinersWorldCoin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd ios
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/app-unsigned.ipa