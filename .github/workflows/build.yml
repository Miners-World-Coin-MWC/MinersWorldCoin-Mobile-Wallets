name: Build Mobile Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Patch react-native-os (compile -> implementation)
        run: |
          FILE="node_modules/react-native-os/android/build.gradle"
          
          if [ -f "$FILE" ]; then
            echo "Patching $FILE"
            sed -i 's/compile /implementation /g' $FILE
          else
            echo "File not found: $FILE"
            exit 1
          fi

      - name: Build Android Release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Fix React Native iOS build env
        run: |
          export RCT_NEW_ARCH_ENABLED=0

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Fix CocoaPods (Ruby 3.3 compatibility)
        run: |
          sudo gem install cocoapods -v 1.16.2
          pod repo update

      - name: Fix boost podspec (full safe replacement)
        run: |
          BOOST_SPEC="node_modules/react-native/third-party-podspecs/boost.podspec"

          if [ -f "$BOOST_SPEC" ]; then
            echo "Overwriting boost podspec with fixed version..."

            printf "Pod::Spec.new do |spec|\n\
              spec.name = 'boost'\n\
              spec.version = '1.76.0'\n\
              spec.license = { :type => 'Boost Software License', :file => 'LICENSE_1_0.txt' }\n\
              spec.homepage = 'https://www.boost.org'\n\
              spec.summary = 'Boost provides free peer-reviewed portable C++ source libraries.'\n\
              spec.authors = 'Rene Rivera'\n\
            \n\
              spec.source = {\n\
                :http => 'https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2',\n\
                :sha256 => '1c162b579a423fa6876c6c5bc16d39ab4bc05e28898977a0a6af345f523f6357'\n\
              }\n\
            \n\
              spec.platforms = { :ios => '11.0', :tvos => '11.0' }\n\
              spec.requires_arc = false\n\
            \n\
              spec.module_name = 'boost'\n\
              spec.header_dir = 'boost'\n\
              spec.preserve_paths = 'boost'\n\
            end\n" > "$BOOST_SPEC"

                else
                  echo "Boost podspec not found!"
                  exit 1
                fi

      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --clean-install

      - name: Build iOS (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace MinersWorldCoin.xcworkspace \
            -scheme MinersWorldCoin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (unsigned)
        run: |
          cd ios
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/app-unsigned.ipa