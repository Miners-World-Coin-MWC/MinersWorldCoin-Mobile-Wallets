name: Build Mobile Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Patch react-native-os (compile -> implementation)
        run: |
          FILE="node_modules/react-native-os/android/build.gradle"
          
          if [ -f "$FILE" ]; then
            echo "Patching $FILE"
            sed -i 's/compile /implementation /g' $FILE
          else
            echo "File not found: $FILE"
            exit 1
          fi

      - name: Build Android Release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Fix React Native iOS build env
        run: |
          export RCT_NEW_ARCH_ENABLED=0

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Fix CocoaPods (Ruby 3.3 compatibility)
        run: |
          sudo gem install cocoapods -v 1.16.2
          pod repo update

      - name: Fix missing Folly podspec
        run: |
          SPEC_DIR="node_modules/react-native/third-party-podspecs"
          mkdir -p "$SPEC_DIR"

          printf "Pod::Spec.new do |s|\n\
            s.name = 'Folly'\n\
            s.version = '2021.07.22.00'\n\
            s.summary = 'Folly'\n\
            s.homepage = 'https://github.com/facebook/folly'\n\
            s.license = { :type => 'Apache 2.0' }\n\
            s.author = 'Facebook'\n\
            s.source = { :git => 'https://github.com/facebook/folly.git', :tag => 'v2021.07.22.00' }\n\
            s.source_files = 'folly/**/*.{h,cpp}'\n\
            s.platforms = { :ios => '11.0' }\n\
          end\n" > "$SPEC_DIR/Folly.podspec"

      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --clean-install

      - name: Build iOS (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace MinersWorldCoin.xcworkspace \
            -scheme MinersWorldCoin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (unsigned)
        run: |
          cd ios
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/app-unsigned.ipa