name: Build Mobile Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Patch react-native-os (compile -> implementation)
        run: |
          FILE="node_modules/react-native-os/android/build.gradle"
          
          if [ -f "$FILE" ]; then
            echo "Patching $FILE"
            sed -i 's/compile /implementation /g' $FILE
          else
            echo "File not found: $FILE"
            exit 1
          fi

      - name: Build Android Release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List installed Xcodes
        run: ls /Applications | grep Xcode

      - name: Select available Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn install --ignore-engines
          yarn jetifier

      - name: Install CocoaPods (pinned)
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod repo update

      - name: Fix React Native env
        run: echo "RCT_NEW_ARCH_ENABLED=0" >> $GITHUB_ENV

      - name: Install Pods (with Boost fallback)
        run: |
          cd ios
          rm -rf Pods Podfile.lock

          set +e

          echo "➡️ Attempting normal pod install..."
          pod install --repo-update
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "⚠️ Pod install failed, applying Boost fallback..."

            # Remove the node_modules Boost podspec to prevent conflicts
            rm -f ../node_modules/react-native/third-party-podspecs/boost.podspec

            mkdir -p vendor/boost
            cd vendor/boost

            curl -L https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2 -o boost.tar.bz2
            tar -xjf boost.tar.bz2

            cd ../../

            echo "➡️ Patching Podfile safely with AWK..."

            # Remove any existing boost lines
            sed -i '' '/pod.*boost/d' Podfile

            # Insert boost AFTER use_react_native block (safe)
            awk '
            /use_react_native!\(/ { inBlock=1 }
            inBlock && /\)/ {
              print
              print "  pod '\''boost'\'', :path => '\''./vendor/boost/boost_1_76_0'\''"
              inBlock=0
              next
            }
            { print }
            ' Podfile > Podfile.tmp && mv Podfile.tmp Podfile

            echo "➡️ Re-running pod install..."
            pod install --repo-update

            if [ $? -ne 0 ]; then
              echo "❌ Pod install failed even after Boost fix"
              exit 1
            fi
          else
            echo "✅ Pod install succeeded normally"
          fi

      - name: Build iOS (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace MinersWorldCoin.xcworkspace \
            -scheme MinersWorldCoin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd ios
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/app-unsigned.ipa